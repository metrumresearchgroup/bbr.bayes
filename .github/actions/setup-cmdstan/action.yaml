name: Setup cmdstan
description: Install cmdstan
runs:
  using: composite
  steps:
    - name: Set CMDSTAN_PATH
      shell: bash
      run: |
        echo "CMDSTAN_PATH=${HOME}/.cmdstan" >>"$GITHUB_ENV"
    - name: Determine OS Version
      id: find-os
      shell: bash
      run:
        echo "osversion=$(lsb_release -rs || :)" >"$GITHUB_OUTPUT"
    - name: Cache cmdstan
      id: cache-cmdstan
      uses: actions/cache@v4
      with:
        path: ~/.cmdstan
        key: cmdstan-${{ runner.os }}-${{ env.VERSION }}
      env:
        VERSION: ${{ steps.find-os.outputs.osversion }}
    - name: Install cmdstan
      if: ${{ steps.cache-cmdstan.outputs.cache-hit != 'true' }}
      shell: Rscript {0}
      run: cmdstanr::install_cmdstan()
